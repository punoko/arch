name: Test
on:
  push:
    branches: [ main ]
jobs:
  neofetch:
    runs-on: ubuntu-latest
    container: archlinux
    steps:
      - name: Update packages
        run: pacman --noconfirm -Syu
      - name: Install neofetch
        run: pacman --noconfirm -S neofetch
      - name: Run neofetch
        run: neofetch
