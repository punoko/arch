name: Test
on: push
jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    container:
      image: archlinux
      options:
        --privileged
    steps:
      - name: Git checkout
        uses: actions/checkout@v3
      - name: Build script
        run: ./build.sh
      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: arch.qcow2
          path: arch.qcow2
          