name: Test
on:
  push:
    branches: [ main ]
jobs:
  neofetch:
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - run: |
          pacman --noconfirm -Syu neofetch
          echo $0
          modprobe loop
          lsblk
          fdisk -l
          losetup -f
          neofetch
