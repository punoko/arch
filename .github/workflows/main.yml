name: Test
on:
  push:
    branches: [ main ]
jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    container:
      image: archlinux
      volumes:
        - /dev:/dev
      options:
        --cap-add=SYS_ADMIN
    steps:
      - uses: actions/checkout@v3.3.0
      - name: Run build script
        run: ./build.sh

