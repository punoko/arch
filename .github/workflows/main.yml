name: Test
on:
  push:
    branches: [ main ]
jobs:
  neofetch:
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - run: |
          echo "PACMAN"
          pacman --noconfirm -Syu neofetch
          echo "SHELL"
          echo $0
          echo "LSBLK"
          lsblk
          echo "FDISK"
          fdisk -l
          echo "NEOFETCH"
          neofetch
