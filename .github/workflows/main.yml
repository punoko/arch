name: Test
on:
  push:
    branches: [ main ]
jobs:
  list:
    name: List dir
    runs-on: ubuntu-latest
    container:
      image: archlinux
    steps:
      - uses: actions/checkout@v3.3.0
      - run: ls -al
      - run: head /etc/pacman.conf
